<h2 mat-dialog-title>
  {{ isEditMode ? 'Edit Department' : 'Create Department' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="mt-4 flex flex-col gap-4">
    <mat-form-field appearance="outline">
      <mat-label>
        Department Name
      </mat-label>

      <input matInput formControlName="departmentName">
      @if (
        form.controls.departmentName.touched
        &&
        form.controls.departmentName.invalid
      ) {
        <mat-error>
          Department name is required
        </mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>
        Description
      </mat-label>

      <textarea
        matInput
        rows="4"
        formControlName="description">
      </textarea>
    </mat-form-field>
  </form>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button mat-dialog-close>
    Cancel
  </button>

  <button
    mat-raised-button
    color="primary"
    [disabled]="isLoading"
    (click)="onSubmit()">

    @if (isLoading) {
      <mat-spinner
        diameter="20">
      </mat-spinner>

    } @else {
      {{ isEditMode ? 'Update' : 'Create' }}
    }
  </button>
</mat-dialog-actions>
