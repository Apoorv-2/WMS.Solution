<h2 mat-dialog-title>
  Employee Credentials
</h2>

<mat-dialog-content>
  <div class="space-y-4">
    <div>
      <p class="text-sm text-gray-500">
        Username
      </p>
      <p class="font-medium">
        {{ data.username }}
      </p>
    </div>

    <div>
      <p class="text-sm text-gray-500">
        Temporary Password
      </p>
      <p class="font-medium">
        {{ data.temporaryPassword }}
      </p>
    </div>

    <div
      class="rounded-xl border border-yellow-200 bg-yellow-50 p-4 text-sm text-yellow-800">
      User must reset password on first login.
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button (click)="copyCredentials()">
    Copy
  </button>

  <button mat-raised-button color="primary" (click)="close()">
    Close
  </button>
</mat-dialog-actions>
