<h2 mat-dialog-title class="text-[var(--mat-sys-on-surface)]">
  Employee Credentials
</h2>

<mat-dialog-content>
  <div class="space-y-4 py-2">
    
    <div>
      <p class="text-sm text-[var(--mat-sys-on-surface-variant)]">
        Username
      </p>
      <p class="font-medium text-[var(--mat-sys-on-surface)] select-all">
        {{ data.username }}
      </p>
    </div>

    <div>
      <p class="text-sm text-[var(--mat-sys-on-surface-variant)]">
        Temporary Password
      </p>
      <p class="font-medium text-[var(--mat-sys-on-surface)] select-all">
        {{ data.temporaryPassword }}
      </p>
    </div>

    <div
      class="
        rounded-xl 
        border 
        border-[var(--mat-sys-warning-outline,#e0a900)] 
        bg-[var(--mat-sys-warning-container,#fff8e1)] 
        p-4 
        text-sm 
        text-[var(--mat-sys-on-warning-container,#4a3b00)]
      ">
      User must reset password on first login.
    </div>
    
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="gap-2 px-6 pb-4">

  <button mat-button (click)="copyCredentials()">
    <mat-icon class="mr-1">content_copy</mat-icon>
    Copy
  </button>

  <button mat-flat-button (click)="close()">
    Close
  </button>
  
</mat-dialog-actions>
