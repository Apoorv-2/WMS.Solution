<h2 mat-dialog-title class="text-[var(--mat-sys-on-surface)]">
  Apply Leave
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="mt-4 flex flex-col gap-4">
    
    <mat-form-field appearance="outline" class="w-full">
      <mat-label> Leave Type </mat-label>
      <mat-select formControlName="leaveType">
        @for (type of leaveTypes; track type) {
          <mat-option [value]="type"> {{ type }} </mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label> From Date </mat-label>
      <input matInput [matDatepicker]="fromPicker" formControlName="fromDate">
      <mat-datepicker-toggle matIconSuffix [for]="fromPicker" />
      <mat-datepicker #fromPicker />
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label> To Date </mat-label>
      <input matInput [matDatepicker]="toPicker" formControlName="toDate">
      <mat-datepicker-toggle matIconSuffix [for]="toPicker" />
      <mat-datepicker #toPicker />
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label> Reason </mat-label>
      <textarea matInput rows="4" formControlName="reason"> </textarea>
    </mat-form-field>

    @if (errorMessage) {
      <p class="text-sm text-[var(--mat-sys-error)] ml-1 font-medium animate-fade-in"> 
        {{ errorMessage }} 
      </p>
    }
    
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="gap-2 px-6 pb-4">
  <button mat-button mat-dialog-close> Cancel </button>

  <button
    mat-flat-button
    [disabled]="submitting || form.invalid"
    (click)="submit()">
    {{ submitting ? 'Applying...' : 'Apply Leave' }}
  </button>
</mat-dialog-actions>
