trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: buildConfiguration
    value: 'Release'
  - name: dotnetVersion
    value: '8.0.x'
  - name: nodeVersion
    value: '22.x'
  - name: apiProject
    value: 'WMS.API/WMS.API.csproj'
  - name: testProject
    value: 'WMS.Tests/WMS.Tests.csproj'
  - name: azureSubscription
    value: 'wms-azure-connection'
  - name: apiAppName
    value: 'wms-api-apoorv'
  - name: frontendAppName
    value: 'wms-frontend-apoorv'

stages:

# ─────────────────────────────────────────
# STAGE 1: Parallel Build, Test, & Package
# ─────────────────────────────────────────
- stage: BuildAndTestAll
  displayName: 'Build, Test & Package'
  jobs:
  - job: BuildAndTestDotNet
    displayName: 'Compile & Test .NET Core'
    steps:
    - task: UseDotNet@2
      inputs:
        version: $(dotnetVersion)

    - task: DotNetCoreCLI@2
      displayName: 'Restore dependencies'
      inputs:
        command: restore
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Compile Solution'
      inputs:
        command: build
        projects: '$(apiProject)'
        arguments: '--configuration $(buildConfiguration)'

    - task: DotNetCoreCLI@2
      displayName: 'Execute Automated Unit Tests'
      inputs:
        command: test
        projects: '$(testProject)'
        arguments: '--configuration $(buildConfiguration) --no-build'

    - task: DotNetCoreCLI@2
      displayName: 'Publish API Package'
      inputs:
        command: publish
        publishWebProjects: false
        projects: '$(apiProject)'
        arguments: '--configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/api'
        zipAfterPublish: true
        modifyOutputPath: false

    - task: PublishPipelineArtifact@1
      displayName: 'Upload API Binaries'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/api'
        artifact: 'api-drop'

  - job: BuildAngular
    displayName: 'Compile & Test Angular UI'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)

    - script: |
        cd WMS.Frontend
        npm ci
      displayName: 'npm clean install'

    # UPDATED: Using Vitest as per your package.json
    - script: |
        cd WMS.Frontend
        npx vitest run
      displayName: 'Run Angular Unit Tests (Vitest)'

    - script: |
        cd WMS.Frontend
        npx ng build --configuration production --output-path $(Build.ArtifactStagingDirectory)/frontend
      displayName: 'Production Angular build'

    - task: ArchiveFiles@2
      displayName: 'Zip compiled UI'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/frontend'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/frontend.zip'
        replaceExistingArchive: true

    - task: PublishPipelineArtifact@1
      displayName: 'Upload Frontend Artifact'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/frontend.zip'
        artifact: 'frontend-drop'

# ─────────────────────────────────────────
# STAGE 2: Protected Deployment
# ─────────────────────────────────────────
- stage: DeployAll
  displayName: 'Deploy to Production'
  dependsOn: BuildAndTestAll
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployBackend
    displayName: 'Deploy API'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: 'api-drop'
              path: '$(Pipeline.Workspace)/api-drop'

          - task: AzureWebApp@1
            displayName: 'Stream Binaries to Backend'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(apiAppName)'
              package: '$(Pipeline.Workspace)/api-drop/*.zip'

  - deployment: DeployFrontend
    displayName: 'Deploy UI'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: 'frontend-drop'
              path: '$(Pipeline.Workspace)/frontend-drop'

          - task: AzureWebApp@1
            displayName: 'Stream Assets to Frontend'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(frontendAppName)'
              package: '$(Pipeline.Workspace)/frontend-drop/frontend.zip'